<!DOCTYPE html>
<html>
    <head>
        <title>check boxes</title>
        <meta charset="utf-8">
    </head>
    <body>
        <form class="container" method="post">
            <label>colors:</label><br>
            <input type="checkbox" name="colors" value="red">red<br>
            <input type="checkbox" name="colors" value="green">green<br>
            <input type="checkbox" name="colors" value="yellow">yellow<br>
            
        </form>
        <div class="output" ><input id="outfield" style="width: 400px;" placeholder="Your selection will display here" type="text" readonly></div>
        <script>
            document.addEventListener("DOMContentLoaded",()=>{
                const chk=document.querySelectorAll("input[name='colors']");
                const result = document.getElementById("outfield");

              chk.forEach(checkbox=>{
                checkbox.addEventListener("change",()=>{
                    const selected = Array.from(chk)
                                .filter(i=>i.checked)
                                .map(i=>i.value);


                 if(selected.length>0){
                    result.value ="dress with colors:"+ selected.join(", ");
                 } else{
                    result.value="";
                 }              
                });
              });
                
              });
        
        </script>
    </body>
</html>
