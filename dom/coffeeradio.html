<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Coffee Selection</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background-color: #f4f4f9;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            font-weight: bold;
        }
        .result-wrapper {
            text-align: center;
            margin-top: 20px;
        }
        #output {
            width: 300px;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <form class="container" id="coffeeform">
        <table>
            <caption><strong>Check the ingredients you want with coffee</strong></caption>
            <tr>
                <td><label for="sugarcheck">Sugar</label></td>
                <td><input type="radio" id="sugarcheck" name="chk" value="Sugar"></td>
            </tr>
            <tr>
                <td><label for="creamcheck">Cream</label></td>
                <td><input type="radio" id="creamcheck" name="chk" value="Cream"></td>
            </tr>
            <tr>
                <td><label for="milkcheck">Milk</label></td>
                <td><input type="radio" id="milkcheck" name="chk" value="Milk"></td>
            </tr>
        </table>
    </form>

    <div class="result-wrapper">
        <input type="text" id="output" placeholder="Your selection will display here" readonly>
    </div>
    </body>
    <script>
        document.addEventListener("DOMContentLoaded",()=>{
            const form=document.querySelector("#coffeeform");
            const resultout=document.getElementById("output");
            form.addEventListener("change", () => {
            let getchecked=document.querySelector("input[name='chk']:checked");

            if(getchecked){
            resultout.value = "Your coffee is with " + getchecked.value;
            }else{
                resultout.value="";
            }
        });
        });
    </script>
    </html>
